name: Tests

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build project with cache
        run: ./gradlew assembleDebug --stacktrace

      - name: Run app unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Run combot unit tests
        run: ./gradlew :combot:testDebugUnitTest

      - name: Run UI tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel
          disable-animations: true
          emulator-options: >
            -no-snapshot
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
            -accel off
          script: |
            adb wait-for-device
            echo "Waiting for emulator to fully boot..."

            boot_completed=""
            for i in {1..150}; do
              boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              if [ "$boot_completed" = "1" ]; then
                echo "Emulator boot completed!"
                break
              fi
              sleep 2
            done

            if [ "$boot_completed" != "1" ]; then
              echo "Emulator failed to boot in time"
              exit 1
            fi

            adb shell input keyevent 82

            ./gradlew :app:connectedDebugAndroidTest --continue

      - name: Get version from Gradle
        id: get_version
        run: |
          VERSION=$(./gradlew :combot:properties -q | grep '^version:' | awk '{print $2}')
          if [[ "$VERSION" == "unspecified" ]]; then
            echo "ERROR: Version not set in Gradle!"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

      - name: Create Git tag automatically
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "Gabriel Brasileiro"
          git config user.email "gah.lucas@gmail.com"
          git fetch --tags
          
          if git tag --list "${{ env.VERSION }}" | grep -q "${{ env.VERSION }}"; then
            echo "Tag ${{ env.VERSION }} already exists. Skipping."
          else
            echo "Creating tag ${{ env.VERSION }}..."
            git tag -a "${{ env.VERSION }}" -m "Release ${{ env.VERSION }}"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git "${{ env.VERSION }}"
          fi