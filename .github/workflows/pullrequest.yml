name: Combot Pull Request CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build project with cache
        run: ./gradlew build --stacktrace

      - name: Run app unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Run combot unit tests
        run: ./gradlew :combot:testDebugUnitTest

      - name: Run UI tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel
          disable-animations: true
          emulator-options: >
            -no-snapshot
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
            -accel off
          script: |
            adb wait-for-device

            echo "Waiting for emulator to fully boot..."

            # Wait until Android system is ready
            timeout 300 bash -c '
              until adb shell getprop sys.boot_completed | tr -d "\r" | grep -q "1"; do
                sleep 2
              done
            '

            echo "Emulator boot completed!"

            # Unlock screen (prevents UI test issues)
            adb shell input keyevent 82

            ./gradlew :app:connectedDebugAndroidTest --continue